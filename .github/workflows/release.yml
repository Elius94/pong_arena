name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build and Release for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: pong_arena
            asset_name: pong_arena-linux-amd64
          - os: windows-latest
            artifact_name: pong_arena.exe
            asset_name: pong_arena-windows-amd64.exe
          - os: macos-latest
            artifact_name: pong_arena
            asset_name: pong_arena-macos-universal

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Build release binary
        run: cargo build --release

      # Questo step rinomina il file prima del caricamento per evitare che su Linux e Mac abbiano lo stesso nome
      - name: Rename artifact for release
        shell: bash
        run: |
          mv target/release/${{ matrix.artifact_name }} target/release/${{ matrix.asset_name }}

      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          files: ./target/release/${{ matrix.asset_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}